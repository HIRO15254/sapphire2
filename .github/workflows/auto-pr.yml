name: Auto PR

on:
  push:
    branches-ignore: [master]

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  manage-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Check for PR metadata
        id: meta
        run: |
          if [ ! -f .github/.pr-meta.json ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "title=$(jq -r '.title // ""' .github/.pr-meta.json)" >> "$GITHUB_OUTPUT"
          echo "draft=$(jq -r '.draft // true' .github/.pr-meta.json)" >> "$GITHUB_OUTPUT"
          echo "ready=$(jq -r '.ready_for_review // false' .github/.pr-meta.json)" >> "$GITHUB_OUTPUT"
          echo "issue=$(jq -r '.issue_number // ""' .github/.pr-meta.json)" >> "$GITHUB_OUTPUT"

          # Body goes to a file to avoid truncation
          jq -r '.body // ""' .github/.pr-meta.json > /tmp/pr-body.txt

      - name: Generate App token
        if: steps.meta.outputs.exists == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Check existing PR
        if: steps.meta.outputs.exists == 'true'
        id: existing
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          echo "number=${PR}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create PR
        if: steps.meta.outputs.exists == 'true' && steps.existing.outputs.number == ''
        run: |
          DRAFT_FLAG=""
          if [ "${{ steps.meta.outputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          gh pr create \
            --base master \
            --head "${{ steps.existing.outputs.branch }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --body-file /tmp/pr-body.txt \
            $DRAFT_FLAG
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Update PR
        if: steps.meta.outputs.exists == 'true' && steps.existing.outputs.number != ''
        run: |
          gh pr edit "${{ steps.existing.outputs.number }}" \
            --title "${{ steps.meta.outputs.title }}" \
            --body-file /tmp/pr-body.txt
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Mark ready for review
        if: steps.meta.outputs.exists == 'true' && steps.meta.outputs.ready == 'true' && steps.existing.outputs.number != ''
        run: gh pr ready "${{ steps.existing.outputs.number }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Get PR number for comment
        if: steps.meta.outputs.exists == 'true'
        id: pr
        run: |
          PR_NUM="${{ steps.existing.outputs.number }}"
          if [ -z "$PR_NUM" ]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            PR_NUM=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          fi
          echo "number=${PR_NUM}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Detect comment identifier
        if: steps.meta.outputs.exists == 'true' && hashFiles('.github/.pr-comment.md') != ''
        id: comment-id
        run: |
          # Extract the first heading to use as comment identifier
          HEADING=$(head -5 .github/.pr-comment.md | grep -m1 '^## ' || echo "")
          echo "heading=${HEADING}" >> "$GITHUB_OUTPUT"

      - name: Find existing comment
        if: steps.comment-id.outputs.heading != ''
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          body-includes: ${{ steps.comment-id.outputs.heading }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Post or update PR comment
        if: steps.comment-id.outputs.heading != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ steps.pr.outputs.number }}
          body-file: .github/.pr-comment.md
          edit-mode: replace
          token: ${{ steps.app-token.outputs.token }}

      - name: Update issue labels
        if: steps.meta.outputs.exists == 'true' && steps.meta.outputs.issue != ''
        run: |
          ISSUE="${{ steps.meta.outputs.issue }}"

          # Add labels
          LABELS=$(jq -r '.labels_add // [] | .[]' .github/.pr-meta.json)
          for label in $LABELS; do
            gh issue edit "$ISSUE" --add-label "$label" || true
          done

          # Remove labels
          REMOVE=$(jq -r '.labels_remove // [] | .[]' .github/.pr-meta.json)
          for label in $REMOVE; do
            gh issue edit "$ISSUE" --remove-label "$label" || true
          done
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
