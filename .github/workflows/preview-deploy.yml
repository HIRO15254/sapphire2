name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.vars.outputs.pr_number }}
      worker_name: ${{ steps.vars.outputs.worker_name }}
      pages_project: ${{ steps.vars.outputs.pages_project }}
      preview_api_url: ${{ steps.vars.outputs.preview_api_url }}
      preview_web_url: ${{ steps.vars.outputs.preview_web_url }}
      d1_db_name: ${{ steps.vars.outputs.d1_db_name }}
    steps:
      - name: Set variables
        id: vars
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          WORKER_NAME="sapphire2-api-pr-${PR_NUMBER}"
          PAGES_PROJECT="sapphire2-web"
          D1_DB_NAME="sapphire2-db-pr-${PR_NUMBER}"

          # Fetch Workers subdomain from Cloudflare API
          WORKERS_SUBDOMAIN=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/subdomain" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | jq -r '.result.subdomain')

          # Fetch Pages domain from Cloudflare API (returns "xxx.pages.dev")
          PAGES_DOMAIN=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PAGES_PROJECT}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | jq -r '.result.subdomain')

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "worker_name=${WORKER_NAME}" >> "$GITHUB_OUTPUT"
          echo "pages_project=${PAGES_PROJECT}" >> "$GITHUB_OUTPUT"
          echo "d1_db_name=${D1_DB_NAME}" >> "$GITHUB_OUTPUT"
          echo "preview_api_url=https://${WORKER_NAME}.${WORKERS_SUBDOMAIN}.workers.dev" >> "$GITHUB_OUTPUT"
          echo "preview_web_url=https://pr-${PR_NUMBER}.${PAGES_DOMAIN}" >> "$GITHUB_OUTPUT"

  d1-setup:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      d1_database_id: ${{ steps.resolve.outputs.d1_database_id }}
      is_new_db: ${{ steps.resolve.outputs.is_new_db }}
    steps:
      - name: Resolve or create D1 database for PR
        id: resolve
        run: |
          DB_NAME="${{ needs.setup.outputs.d1_db_name }}"

          # Check if database already exists
          EXISTING_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r ".result[] | select(.name == \"${DB_NAME}\") | .uuid")

          if [ -n "$EXISTING_ID" ]; then
            echo "Reusing existing D1 database: $EXISTING_ID"
            echo "d1_database_id=${EXISTING_ID}" >> "$GITHUB_OUTPUT"
            echo "is_new_db=false" >> "$GITHUB_OUTPUT"
          else
            # Create new database
            NEW_ID=$(curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${DB_NAME}\"}" \
              | jq -r '.result.uuid')
            echo "Created D1 database: $NEW_ID"
            echo "d1_database_id=${NEW_ID}" >> "$GITHUB_OUTPUT"
            echo "is_new_db=true" >> "$GITHUB_OUTPUT"
          fi

  db-migrate:
    needs: [setup, d1-setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Apply migrations to PR database
        working-directory: apps/server
        run: |
          sed -i "s/database_id = \".*\"/database_id = \"${{ needs.d1-setup.outputs.d1_database_id }}\"/" wrangler.toml
          sed -i "s/database_name = \".*\"/database_name = \"${{ needs.setup.outputs.d1_db_name }}\"/" wrangler.toml
          bunx wrangler d1 migrations apply "${{ needs.setup.outputs.d1_db_name }}" --remote

      - name: Seed data from parent branch DB (first deploy only)
        if: needs.d1-setup.outputs.is_new_db == 'true'
        working-directory: apps/server
        run: |
          # Determine source database: parent branch PR DB or production
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          SOURCE_DB="sapphire2-db"

          if [ "$BASE_REF" != "master" ] && [ "$BASE_REF" != "main" ]; then
            # Find parent branch's PR number to use its DB
            PARENT_PR=$(curl -sf \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              | jq -r ".result[] | select(.name | startswith(\"sapphire2-db-pr-\")) | select(.name != \"${{ needs.setup.outputs.d1_db_name }}\") | .name" \
              | head -1)

            # Search for a PR DB matching the base branch
            BASE_DB_NAME=""
            OPEN_PRS=$(curl -sf \
              "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:${BASE_REF}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              | jq -r '.[0].number // empty')

            if [ -n "$OPEN_PRS" ]; then
              CANDIDATE="sapphire2-db-pr-${OPEN_PRS}"
              EXISTS=$(curl -sf \
                "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
                -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                | jq -r ".result[] | select(.name == \"${CANDIDATE}\") | .uuid")
              if [ -n "$EXISTS" ]; then
                SOURCE_DB="$CANDIDATE"
                echo "Using parent branch DB: $SOURCE_DB"
              fi
            fi
          fi

          echo "Exporting data from: $SOURCE_DB"
          git checkout wrangler.toml
          bunx wrangler d1 export "$SOURCE_DB" --remote --no-schema --output=dump.sql

          # Remove d1_migrations data (already applied via migrations step)
          sed -i '/INSERT INTO.*d1_migrations/d' dump.sql

          # Remove INSERT statements for tables whose schema changed across migrations.
          # The source DB may have columns that no longer exist in the target DB
          # (e.g. tournament.rebuy_allowed removed in migration 0009).
          # We drop these rows and let the target DB start fresh for affected tables.
          sed -i '/INSERT INTO.*tournament[^_]/d' dump.sql

          # Wrap with PRAGMA to disable FK checks during import
          sed -i '1i PRAGMA foreign_keys = OFF;' dump.sql
          echo 'PRAGMA foreign_keys = ON;' >> dump.sql

          sed -i "s/database_id = \".*\"/database_id = \"${{ needs.d1-setup.outputs.d1_database_id }}\"/" wrangler.toml
          sed -i "s/database_name = \".*\"/database_name = \"${{ needs.setup.outputs.d1_db_name }}\"/" wrangler.toml
          bunx wrangler d1 execute "${{ needs.setup.outputs.d1_db_name }}" --remote --file=dump.sql

  deploy-api:
    needs: [setup, d1-setup, db-migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Deploy Worker
        working-directory: apps/server
        run: |
          sed -i "s/database_id = \".*\"/database_id = \"${{ needs.d1-setup.outputs.d1_database_id }}\"/" wrangler.toml
          sed -i "s/database_name = \".*\"/database_name = \"${{ needs.setup.outputs.d1_db_name }}\"/" wrangler.toml
          bunx wrangler deploy \
            --name "${{ needs.setup.outputs.worker_name }}" \
            --var BETTER_AUTH_URL:"${{ needs.setup.outputs.preview_api_url }}" \
            --var CORS_ORIGIN:"${{ needs.setup.outputs.preview_web_url }}" \
            --var NODE_ENV:production

      - name: Set Worker secrets
        working-directory: apps/server
        run: |
          echo "${{ secrets.BETTER_AUTH_SECRET }}" | bunx wrangler secret put BETTER_AUTH_SECRET --name "${{ needs.setup.outputs.worker_name }}"
          echo "${{ secrets.GOOGLE_CLIENT_ID }}" | bunx wrangler secret put GOOGLE_CLIENT_ID --name "${{ needs.setup.outputs.worker_name }}"
          echo "${{ secrets.GOOGLE_CLIENT_SECRET }}" | bunx wrangler secret put GOOGLE_CLIENT_SECRET --name "${{ needs.setup.outputs.worker_name }}"
          echo "${{ secrets.DISCORD_CLIENT_ID }}" | bunx wrangler secret put DISCORD_CLIENT_ID --name "${{ needs.setup.outputs.worker_name }}"
          echo "${{ secrets.DISCORD_CLIENT_SECRET }}" | bunx wrangler secret put DISCORD_CLIENT_SECRET --name "${{ needs.setup.outputs.worker_name }}"

  deploy-web:
    needs: [setup, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Build web
        run: bun run --filter web build
        env:
          VITE_SERVER_URL: ${{ needs.setup.outputs.preview_api_url }}
          VITE_PREVIEW_AUTO_LOGIN: "true"
          VITE_PREVIEW_LOGIN_EMAIL: ${{ secrets.PREVIEW_LOGIN_EMAIL }}
          VITE_PREVIEW_LOGIN_PASSWORD: ${{ secrets.PREVIEW_LOGIN_PASSWORD }}

      - name: Deploy to Cloudflare Pages
        run: |
          bunx wrangler pages deploy apps/web/dist \
            --project-name "${{ needs.setup.outputs.pages_project }}" \
            --branch "pr-${{ needs.setup.outputs.pr_number }}"

  comment:
    needs: [setup, deploy-api, deploy-web]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ needs.setup.outputs.pr_number }}
          comment-author: github-actions[bot]
          body-includes: "Preview Environment"

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ needs.setup.outputs.pr_number }}
          edit-mode: replace
          body: |
            ## Preview Environment

            | Service | URL |
            |---------|-----|
            | Frontend | ${{ needs.setup.outputs.preview_web_url }} |
            | API | ${{ needs.setup.outputs.preview_api_url }} |

            **Database:** D1 database `${{ needs.setup.outputs.d1_db_name }}` (初回: 親ブランチDBコピー / 2回目以降: データ持ち越し+マイグレーション適用)

            _Last deployed: ${{ github.sha }}_
