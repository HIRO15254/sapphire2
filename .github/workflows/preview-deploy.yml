name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.vars.outputs.pr_number }}
      worker_name: ${{ steps.vars.outputs.worker_name }}
      pages_project: ${{ steps.vars.outputs.pages_project }}
      preview_api_url: ${{ steps.vars.outputs.preview_api_url }}
      preview_web_url: ${{ steps.vars.outputs.preview_web_url }}
    steps:
      - name: Set variables
        id: vars
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          WORKER_NAME="sapphire2-api-pr-${PR_NUMBER}"
          PAGES_PROJECT="sapphire2-web"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "worker_name=${WORKER_NAME}" >> "$GITHUB_OUTPUT"
          echo "pages_project=${PAGES_PROJECT}" >> "$GITHUB_OUTPUT"
          echo "preview_api_url=https://${WORKER_NAME}.${CLOUDFLARE_ACCOUNT_ID}.workers.dev" >> "$GITHUB_OUTPUT"
          echo "preview_web_url=https://pr-${PR_NUMBER}.${PAGES_PROJECT}.pages.dev" >> "$GITHUB_OUTPUT"

  neon-branch:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Install neonctl
        run: npm install -g neonctl

      - name: Create Neon branch
        run: |
          if [ -z "$NEON_API_KEY" ]; then
            echo "::error::NEON_API_KEY secret is not set"
            exit 1
          fi

          BRANCH_NAME="pr-${{ needs.setup.outputs.pr_number }}"

          # Check if branch exists
          EXISTING=$(neonctl branches list --project-id "$NEON_PROJECT_ID" --api-key "$NEON_API_KEY" --output json | jq -r ".[] | select(.name == \"${BRANCH_NAME}\") | .id")

          if [ -n "$EXISTING" ]; then
            echo "Branch already exists: $EXISTING"
          else
            neonctl branches create \
              --project-id "$NEON_PROJECT_ID" \
              --api-key "$NEON_API_KEY" \
              --name "$BRANCH_NAME"
          fi

  db-migrate:
    needs: [setup, neon-branch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install neonctl
        run: npm install -g neonctl
      - name: Run migrations
        run: |
          DATABASE_URL=$(neonctl connection-string \
            --project-id "$NEON_PROJECT_ID" \
            --api-key "$NEON_API_KEY" \
            --branch "pr-${{ needs.setup.outputs.pr_number }}")
          DATABASE_URL="${DATABASE_URL}" bun run db:migrate

  deploy-api:
    needs: [setup, db-migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Install neonctl
        run: npm install -g neonctl

      - name: Deploy Worker
        working-directory: apps/server
        run: |
          bunx wrangler deploy \
            --name "${{ needs.setup.outputs.worker_name }}" \
            --var BETTER_AUTH_URL:"${{ needs.setup.outputs.preview_api_url }}" \
            --var CORS_ORIGIN:"${{ needs.setup.outputs.preview_web_url }}" \
            --var NODE_ENV:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        working-directory: apps/server
        run: |
          DATABASE_URL=$(neonctl connection-string \
            --project-id "$NEON_PROJECT_ID" \
            --api-key "$NEON_API_KEY" \
            --branch "pr-${{ needs.setup.outputs.pr_number }}")
          echo "${DATABASE_URL}" | bunx wrangler secret put DATABASE_URL --name "${{ needs.setup.outputs.worker_name }}"
          echo "${{ secrets.BETTER_AUTH_SECRET }}" | bunx wrangler secret put BETTER_AUTH_SECRET --name "${{ needs.setup.outputs.worker_name }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-web:
    needs: [setup, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Build web
        run: bun run --filter web build
        env:
          VITE_SERVER_URL: ${{ needs.setup.outputs.preview_api_url }}

      - name: Deploy to Cloudflare Pages
        run: |
          bunx wrangler pages deploy apps/web/dist \
            --project-name "${{ needs.setup.outputs.pages_project }}" \
            --branch "pr-${{ needs.setup.outputs.pr_number }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  comment:
    needs: [setup, deploy-api, deploy-web]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ needs.setup.outputs.pr_number }}
          comment-author: github-actions[bot]
          body-includes: "Preview Environment"

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ needs.setup.outputs.pr_number }}
          edit-mode: replace
          body: |
            ## Preview Environment

            | Service | URL |
            |---------|-----|
            | Frontend | ${{ needs.setup.outputs.preview_web_url }} |
            | API | ${{ needs.setup.outputs.preview_api_url }} |

            **Database:** Neon branch `pr-${{ needs.setup.outputs.pr_number }}`

            _Last deployed: ${{ github.sha }}_
