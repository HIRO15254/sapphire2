name: Preview Cleanup

on:
  pull_request:
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Delete Cloudflare Worker
        run: |
          bunx wrangler delete \
            --name "sapphire2-api-pr-${{ github.event.pull_request.number }}" \
            --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true

      - name: Delete Neon branch
        run: |
          npm install -g neonctl
          neonctl branches delete \
            "pr-${{ github.event.pull_request.number }}" \
            --project-id "$NEON_PROJECT_ID" \
            --api-key "$NEON_API_KEY" \
            --force
        continue-on-error: true

      - name: Update PR comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "Preview Environment"

      - name: Mark as cleaned up
        if: steps.find.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Preview Environment

            ~Preview environment has been cleaned up.~

            _Cleaned up at: ${{ github.event.pull_request.closed_at }}_
