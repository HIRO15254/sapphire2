name: Preview Cleanup

on:
  pull_request:
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_PREFIX: sapphire2-api-pr-

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Delete backend Worker
        run: |
          WORKER_NAME="${WORKER_PREFIX}${{ github.event.pull_request.number }}"
          STATUS=$(curl -s -o /tmp/worker-delete.json -w "%{http_code}" -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER_NAME}?force=true" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          if [ "$STATUS" = "200" ]; then
            echo "Deleted Worker: ${WORKER_NAME}"
          elif [ "$STATUS" = "404" ]; then
            echo "Worker ${WORKER_NAME} not found (already deleted)"
          else
            echo "Failed to delete Worker ${WORKER_NAME} (HTTP ${STATUS})"
            cat /tmp/worker-delete.json
            exit 1
          fi
        continue-on-error: true

      - name: Delete orphan preview Workers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPEN_PRS=$(gh api \
            "repos/${{ github.repository }}/pulls?state=open&per_page=100" \
            --paginate \
            --jq '.[].number' | sort -u)

          WORKERS=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r --arg prefix "${WORKER_PREFIX}" \
              '.result[] | select(.id | startswith($prefix)) | .id')

          if [ -z "$WORKERS" ]; then
            echo "No preview Workers found"
            exit 0
          fi

          for WORKER in $WORKERS; do
            PR_NUM="${WORKER#${WORKER_PREFIX}}"
            if echo "$OPEN_PRS" | grep -qx "$PR_NUM"; then
              echo "Keeping ${WORKER} (PR #${PR_NUM} still open)"
              continue
            fi
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${WORKER}?force=true" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
              echo "Deleted orphan Worker: ${WORKER}"
            else
              echo "Failed to delete ${WORKER} (HTTP ${STATUS})"
            fi
          done
        continue-on-error: true

      - name: Delete frontend Pages deployments
        run: |
          BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
          PROJECT_NAME="sapphire2-web"

          DEPLOYMENT_IDS=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r ".result[] | select(.deployment_trigger.metadata.branch == \"${BRANCH_NAME}\") | .id")

          if [ -z "$DEPLOYMENT_IDS" ]; then
            echo "No Pages deployments found for ${BRANCH_NAME}"
            exit 0
          fi

          for DEPLOYMENT_ID in $DEPLOYMENT_IDS; do
            curl -sf -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments/${DEPLOYMENT_ID}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" >/dev/null
            echo "Deleted Pages deployment: ${DEPLOYMENT_ID}"
          done
        continue-on-error: true

      - name: Delete D1 database
        run: |
          DB_NAME="sapphire2-db-pr-${{ github.event.pull_request.number }}"
          DB_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            | jq -r ".result[] | select(.name == \"${DB_NAME}\") | .uuid")

          if [ -n "$DB_ID" ]; then
            curl -sf -X DELETE \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/d1/database/${DB_ID}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
            echo "Deleted D1 database: ${DB_ID}"
          else
            echo "No D1 database found for PR"
          fi
        continue-on-error: true

      - name: Update PR comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "Preview Environment"

      - name: Mark as cleaned up
        if: steps.find.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          edit-mode: replace
          body: |
            ## Preview Environment

            ~Preview environment has been cleaned up.~

            _Cleaned up at: ${{ github.event.pull_request.closed_at }}_
