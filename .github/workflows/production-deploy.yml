name: Production Deploy

on:
  push:
    branches: [master]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bun run check-types
      - name: Lint
        run: bun run check
      - name: Test
        run: bun run test:ci

  db-migrate:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Run D1 migrations
        run: bun run db:migrate:remote

  deploy-api:
    needs: [ci, db-migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Deploy Worker
        working-directory: apps/server
        run: |
          bunx wrangler deploy \
            --var BETTER_AUTH_URL:"${{ secrets.PRODUCTION_API_URL }}" \
            --var CORS_ORIGIN:"${{ secrets.PRODUCTION_WEB_URL }}" \
            --var NODE_ENV:production

      - name: Set Worker secrets
        working-directory: apps/server
        run: |
          echo "${{ secrets.BETTER_AUTH_SECRET }}" | bunx wrangler secret put BETTER_AUTH_SECRET

  deploy-web:
    needs: [ci, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      - name: Build web
        run: bun run --filter web build
        env:
          VITE_SERVER_URL: ${{ secrets.PRODUCTION_API_URL }}

      - name: Deploy to Cloudflare Pages
        run: |
          bunx wrangler pages deploy apps/web/dist \
            --project-name "sapphire2-web" \
            --branch main
